<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T7 Coffee — Вход в панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #f5b301; --accent2: #ffce3a; --on-accent:#1a1505; --black: #0a0a0b; --white: #f4f3ef; }
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(245,179,1,.10), transparent 60%),
        var(--black);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .login-box {
      background: linear-gradient(180deg,#161617,#111113);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 2.8rem 2.5rem;
      width: 100%; max-width: 390px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .logo-mark {
      width: 58px; height: 58px; margin: 0 auto 1.1rem;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: var(--on-accent);
      box-shadow: 0 8px 24px rgba(245,179,1,.28);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem; font-weight: 400;
      color: var(--white); letter-spacing: .12em;
      margin-bottom: .35rem;
    }
    .logo-sub {
      font-size: .62rem; font-weight: 700; letter-spacing: .26em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 2.4rem;
    }
    label {
      display: block; text-align: left;
      font-size: .62rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.45);
      margin-bottom: .5rem;
    }
    input[type="password"] {
      width: 100%; padding: .9rem 1rem;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: var(--white); font-family: 'Inter', sans-serif;
      font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 1.3rem;
    }
    input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,179,1,.14); }
    button {
      width: 100%; padding: .95rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--on-accent);
      border: none; cursor: pointer; border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem; font-weight: 800;
      letter-spacing: .14em; text-transform: uppercase;
      transition: transform .1s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(245,179,1,.25);
    }
    button:hover { box-shadow: 0 8px 26px rgba(245,179,1,.4); }
    button:active { transform: scale(.99); }
    .err {
      display: none; margin-top: 1rem;
      background: rgba(220,50,50,.1);
      border: 1px solid rgba(220,50,50,.3);
      color: #ff6b6b; padding: .8rem; border-radius: 8px;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-mark">T7</div>
    <div class="logo">T7 Coffee</div>
    <div class="logo-sub">Панель администратора</div>

    <div id="roleSelect" style="display:none;margin-bottom:2rem">
      <div style="font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:1.2rem">Выберите роль</div>
      <button onclick="selectRole('admin')" style="margin-bottom:.7rem;width:100%;background:var(--accent)">👤 Администратор</button>
      <button onclick="selectRole('manager')" style="background:rgba(245,179,1,.3);border:1px solid var(--accent)">👥 Менеджер</button>
    </div>

    <div id="loginForm">
      <label for="pwd">Пароль</label>
      <input type="password" id="pwd" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')login()"/>
      <button onclick="login()">Войти →</button>
    </div>

    <div class="err" id="err">Неверный пароль. Попробуйте снова.</div>
  </div>

  <script>
    let selectedRole = 'admin';

    // Clear any previous session on login page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        // Don't redirect if already on login page
      });
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('roleSelect').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('pwd').focus();
    }

    async function login() {
      const pwd = document.getElementById('pwd').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      if (!pwd) {
        err.textContent = 'Введите пароль';
        err.style.display = 'block';
        return;
      }
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        const data = await res.json();
        if (res.ok && data.token && data.role) {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('userRole', data.role);
          window.location.href = 'dashboard.html';
        } else {
          err.textContent = 'Неверный пароль. Попробуйте снова.';
          err.style.display = 'block';
          document.getElementById('pwd').value = '';
        }
      } catch (e) {
        err.textContent = 'Ошибка соединения: ' + (e.message || 'сервер недоступен');
        err.style.display = 'block';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('roleSelect').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
    });
  </script>
</body>
</html>
