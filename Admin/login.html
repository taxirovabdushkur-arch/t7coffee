<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T7 Coffee — Вход в панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #C8A97E; --black: #111; --white: #fff; --grey: #F5F5F5; --border: #E0E0E0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.08);
      padding: 3rem 2.5rem;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 300;
      color: var(--white); letter-spacing: .15em;
      margin-bottom: .4rem;
    }
    .logo-sub {
      font-size: .62rem; font-weight: 600; letter-spacing: .25em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 2.5rem;
    }
    label {
      display: block; text-align: left;
      font-size: .62rem; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
      margin-bottom: .4rem;
    }
    input[type="password"] {
      width: 100%; padding: .85rem 1rem;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--white); font-family: 'Inter', sans-serif;
      font-size: .9rem; outline: none;
      transition: border-color .2s;
      margin-bottom: 1.2rem;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: .95rem;
      background: var(--accent); color: var(--black);
      border: none; cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .78rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    .err {
      display: none; margin-top: 1rem;
      background: rgba(220,50,50,.1);
      border: 1px solid rgba(220,50,50,.3);
      color: #ff6b6b; padding: .8rem;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">T7 Coffee</div>
    <div class="logo-sub">Панель администратора</div>
    <label for="pwd">Пароль</label>
    <input type="password" id="pwd" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Войти →</button>
    <div class="err" id="err">Неверный пароль. Попробуйте снова.</div>
  </div>

  <script>
    if (localStorage.getItem('adminToken')) {
      window.location.href = 'dashboard.html';
    }
    async function login() {
      const pwd = document.getElementById('pwd').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      try {
        const res  = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'dashboard.html';
        } else {
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Ошибка соединения с сервером.';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
